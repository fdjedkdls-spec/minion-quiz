// 実キャラ画像（img/<EN>.webp）。単体HTMLで開くなど画像が無い環境ではSVGにフォールバック
function minionImg(c, size){
  return `<img class="minion" src="img/${c.en}.webp" width="${size}" height="${size}" alt="${c.n}" onerror="imgFail(this,'${c.c}',${size})">`;
}
function imgFail(el, color, size){
  const span = document.createElement("span");
  span.innerHTML = minionSVG(color, size);
  el.replaceWith(span.firstElementChild);
}

function minionSVG(color, size){
  // ゲームの一つ目ミニオンを模したSVG（丸いスライム+大きな一つ目+短い手足）
  return `<svg class="minion" width="${size}" height="${size}" viewBox="0 0 100 100">
    <ellipse cx="50" cy="93" rx="26" ry="5" fill="#000" opacity=".35"/>
    <path d="M50 12 C 74 12 88 34 88 56 C 88 78 72 90 50 90 C 28 90 12 78 12 56 C 12 34 26 12 50 12 Z" fill="${color}" stroke="#101020" stroke-width="3"/>
    <path d="M50 12 C 60 12 70 18 76 28 C 62 20 46 18 34 24 C 38 17 44 12 50 12 Z" fill="#fff" opacity=".22"/>
    <ellipse cx="24" cy="70" rx="7" ry="9" fill="${color}" stroke="#101020" stroke-width="3"/>
    <ellipse cx="76" cy="70" rx="7" ry="9" fill="${color}" stroke="#101020" stroke-width="3"/>
    <circle cx="50" cy="50" r="19" fill="#fff" stroke="#101020" stroke-width="3"/>
    <circle cx="50" cy="52" r="10" fill="#1a2a6e"/>
    <circle cx="50" cy="52" r="5" fill="#000"/>
    <circle cx="46" cy="47" r="3.5" fill="#fff"/>
    <ellipse cx="40" cy="94" rx="8" ry="4.5" fill="${color}" stroke="#101020" stroke-width="3"/>
    <ellipse cx="60" cy="94" rx="8" ry="4.5" fill="${color}" stroke="#101020" stroke-width="3"/>
  </svg>`;
}

function start(){
  qi = 0; scores = [0,0,0,0,0,0,0];
  $("screen-start").classList.add("hidden");
  $("screen-result").classList.add("hidden");
  $("screen-q").classList.remove("hidden");
  renderQ();
}

function renderQ(){
  const q = QUESTIONS[qi];
  $("bar").style.width = (qi / QUESTIONS.length * 100) + "%";
  $("qnum").textContent = `Q${qi+1} / ${QUESTIONS.length}`;
  $("qtext").textContent = q.q;
  const opts = $("opts");
  opts.innerHTML = "";
  q.o.forEach(([label, w]) => {
    const b = document.createElement("button");
    b.className = "btn btn-opt fade";
    b.textContent = label;
    b.onclick = () => answer(w);
    opts.appendChild(b);
  });
}

function answer(w){
  w.forEach((v,i)=>scores[i]+=v);
  qi++;
  if(qi < QUESTIONS.length) renderQ();
  else showResult();
}

function ranked(){
  return CHARS.map(c => {
    const norm = Math.hypot(...c.v) || 1;
    const dot = c.v.reduce((s,v,i)=>s + v*scores[i], 0);
    return {c, s: dot / norm};
  }).sort((a,b)=>b.s-a.s);
}

function showResult(){
  const [top, second] = ranked();
  const c = top.c;
  const el = $("screen-result");
  el.innerHTML = `
    <div class="sub" style="letter-spacing:.15em">あなたのミニオンタイプは……</div>
    ${minionImg(c, 170)}
    <div class="result-name">${c.e} ${c.n}</div>
    <div class="result-en">${c.en}</div>
    <div style="margin-top:10px"><span class="rarity r-${c.r}">${c.r.toUpperCase()}</span></div>
    <div class="catch">${c.catch}</div>
    <div class="desc" style="text-align:left">${c.d}</div>
    <div class="buddy">${minionImg(second.c, 44)}
      <span>気が合う仲間: <b>${second.c.e} ${second.c.n}</b>（2番目に近いタイプ）</span></div>
    <button class="btn share-x" onclick="shareX('${c.n}')">𝕏 で結果をシェア</button>
    <button class="btn share-copy" onclick="copyResult('${c.n}')">結果をコピー</button>
    <a class="btn store" style="text-decoration:none" href="${CONFIG.storeUrl}" target="_blank" rel="noopener">🎮 ${c.n}を使ってみる（無料）</a>
    <button class="btn retry" onclick="start()">もう一度診断する</button>
  `;
  $("screen-q").classList.add("hidden");
  el.classList.remove("hidden");
  el.classList.add("fade");
}

function shareText(name){
  return `私のミニオンタイプは「${name}」でした!\nあなたはどのミニオン? 10問で診断→ ${location.href}\n${CONFIG.hashtag}`;
}
function shareX(name){
  window.open("https://twitter.com/intent/tweet?text=" + encodeURIComponent(shareText(name)), "_blank");
}
function copyResult(name){
  navigator.clipboard.writeText(shareText(name)).then(()=>alert("コピーしました!"));
}

// トップ画面のミニオン（兵士）
$("hero-minion").outerHTML = minionImg(CHARS[0], 150);
</script>
</body>
</html>
